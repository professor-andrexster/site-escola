<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Galeria de Fotos - Escola Estadual Dr. João Beraldo</title>
    <meta name="description" content="Veja as fotos das instalações, salas de aula, laboratórios e atividades dos alunos da E.E. Dr. João Beraldo.">
    <meta name="keywords" content="fotos, galeria, laboratório, quadra, fachada, alunos, escola, ambiente escolar">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header id="main-header">
        <!-- Header será carregado dinamicamente pelo components.js -->
    </header>

    <main>
        
        <section class="page-hero section-padding bg-light" aria-labelledby="galeria-title">
            <div class="container text-center">
                <h1 id="galeria-title" class="section-title">Nossa Escola em Imagens</h1>
                <p class="section-subtitle">Conheça nossos laboratórios, salas e o dia a dia dos nossos alunos.</p>
            </div>
        </section>

        <section id="photo-gallery" class="section-padding" aria-labelledby="photos-title">
            <div class="container">
                <div class="section-header text-center">
                    <h2 id="photos-title">Instalações e Atividades</h2>
                    <p>Explore os espaços que fazem da nossa escola um ambiente de aprendizado único</p>
                </div>
                
                <div class="gallery-grid">
                    
                    <figure class="gallery-item animate-in" data-category="Instalações">
                        <div class="gallery-image">
                            <img src="images/fachada.jpg" alt="Fachada principal da Escola Estadual Dr. João Beraldo" loading="lazy">
                        </div>
                        <figcaption>Fachada Principal (79 Anos)</figcaption>
                    </figure>
                    
                    <figure class="gallery-item animate-in" data-category="Laboratório">
                        <div class="gallery-image">
                            <img src="images/IMG-20251030-WA0078.jpg" alt="Alunos trabalhando em computadores no laboratório de informática" loading="lazy">
                        </div>
                        <figcaption>Laboratório de Informática em Uso</figcaption>
                    </figure>
                    
                    <figure class="gallery-item animate-in" data-category="Instalações">
                        <div class="gallery-image">
                            <img src="images/IMG-20251030-WA0084.jpg" alt="Área coberta do pátio e refeitório da escola" loading="lazy">
                        </div>
                        <figcaption>Pátio e Refeitório Coberto</figcaption>
                    </figure>
                    
                    <figure class="gallery-item animate-in" data-category="Atividades">
                        <div class="gallery-image">
                            <img src="images/IMG-20251030-WA0093.jpg" alt="Alunos em atividade de grupo na sala de aula" loading="lazy">
                        </div>
                        <figcaption>Atividade Dinâmica em Sala de Aula</figcaption>
                    </figure>
                    
                    <figure class="gallery-item animate-in" data-category="Instalações">
                        <div class="gallery-image">
                            <img src="images/IMG-20251030-WA0081.jpg" alt="Corredores e estrutura interna da escola" loading="lazy">
                        </div>
                        <figcaption>Corredor Interno e Estrutura</figcaption>
                    </figure>

                    <figure class="gallery-item animate-in" data-category="Atividades">
                        <div class="gallery-image">
                            <img src="images/IMG-20251030-WA0095.jpg" alt="Grupo de alunos interagindo e sorrindo" loading="lazy">
                        </div>
                        <figcaption>Protagonismo e Interação Juvenil</figcaption>
                    </figure>
                    
                    <figure class="gallery-item animate-in" data-category="Laboratório">
                        <div class="gallery-image">
                            <img src="images/IMG-20251030-WA0079.jpg" alt="Alunos no laboratório de informática" loading="lazy">
                        </div>
                        <figcaption>Foco em Tecnologia e Robótica</figcaption>
                    </figure>
                    
                    <figure class="gallery-item animate-in" data-category="Instalações">
                        <div class="gallery-image">
                            <img src="images/IMG-20251030-WA0080.jpg" alt="Área externa da escola" loading="lazy">
                        </div>
                        <figcaption>Ambientes de Convivência</figcaption>
                    </figure>
                    
                    <figure class="gallery-item animate-in" data-category="Atividades">
                        <div class="gallery-image">
                            <img src="images/IMG-20251030-WA0088.jpg" alt="Alunos em aula prática" loading="lazy">
                        </div>
                        <figcaption>Aprendizado Prático</figcaption>
                    </figure>
                    
                    <figure class="gallery-item animate-in" data-category="Atividades">
                        <div class="gallery-image">
                            <img src="images/IMG-20251030-WA0089.jpg" alt="Grupo de alunos no refeitório" loading="lazy">
                        </div>
                        <figcaption>Refeições e Interação</figcaption>
                    </figure>
                    
                    <figure class="gallery-item animate-in" data-category="Atividades">
                        <div class="gallery-image">
                            <img src="images/IMG-20251030-WA0090.jpg" alt="Alunos em atividade com computadores" loading="lazy">
                        </div>
                        <figcaption>Projetos de Informática</figcaption>
                    </figure>
                    
                    <figure class="gallery-item animate-in" data-category="Atividades">
                        <div class="gallery-image">
                            <img src="images/IMG-20251030-WA0091.jpg" alt="Alunos em grupo" loading="lazy">
                        </div>
                        <figcaption>Trabalho em Equipe</figcaption>
                    </figure>
                    
                    <figure class="gallery-item animate-in" data-category="Atividades">
                        <div class="gallery-image">
                            <img src="images/IMG-20251030-WA0092.jpg" alt="Alunos em sala de aula" loading="lazy">
                        </div>
                        <figcaption>Concentração em Sala de Aula</figcaption>
                    </figure>
                    
                    <figure class="gallery-item animate-in" data-category="Instalações">
                        <div class="gallery-image">
                            <img src="images/IMG-20251030-WA0082.jpg" alt="Visão da área interna da escola" loading="lazy">
                        </div>
                        <figcaption>Ambiente Acolhedor</figcaption>
                    </figure>
                    
                    <figure class="gallery-item animate-in" data-category="Instalações">
                        <div class="gallery-image">
                            <img src="images/IMG-20251030-WA0083.jpg" alt="Detalhe do corredor da escola" loading="lazy">
                        </div>
                        <figcaption>Espaços para Estudo</figcaption>
                    </figure>

                </div>
                
                <div class="text-center" style="margin-top: 40px;">
                    <a href="index.html" class="btn btn-outline">Voltar para o Início</a>
                </div>
            </div>
        </section>
        
    </main>

    <footer id="main-footer">
        <!-- Footer será carregado dinamicamente pelo components.js -->
    </footer>

    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
